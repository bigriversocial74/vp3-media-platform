name: VP3 First Admin Web Setup

on:
  pull_request:
    paths:
      - 'create-first-admin.php'
      - 'install.php'
      - 'tests/first-admin-web-*.php'
      - '.github/workflows/first-admin-web.yml'
  push:
    branches: [main]
    paths:
      - 'create-first-admin.php'
      - 'install.php'
      - 'tests/first-admin-web-*.php'
      - '.github/workflows/first-admin-web.yml'

permissions:
  contents: read

jobs:
  first-admin-web-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: PHP syntax
        run: php -l create-first-admin.php && php -l install.php && php -l tests/first-admin-web-smoke.php && php -l tests/first-admin-web-audit.php
      - name: First-admin setup smoke
        run: php tests/first-admin-web-smoke.php
      - name: First-admin setup security audit
        run: php tests/first-admin-web-audit.php
