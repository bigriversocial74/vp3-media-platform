name: Import VP3 Foundation v1

on:
  push:
    branches:
      - feature/vp3-foundation-v1
    paths:
      - '.vp3-import/**'
      - '.github/workflows/import-foundation.yml'

permissions:
  contents: write

jobs:
  import-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out import branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .vp3-import/source.part-* > /tmp/vp3-current-source.tar.xz
          echo 'ce69dc3413d68cc20272708778b0d10f79f8ce4a36f6fbc134f2df7e8ae5cdab  /tmp/vp3-current-source.tar.xz' | sha256sum -c -

      - name: Replace staging tree with audited source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          tar -xJf /tmp/vp3-current-source.tar.xz -C .

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run executable smoke tests
        run: php tests/smoke.php

      - name: Run static security audit
        run: php tests/static-audit.php

      - name: Commit audited Foundation v1 source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Import audited VP3 Foundation v1'
          git push origin HEAD:feature/vp3-foundation-v1
