name: Build VP3 Initial Deploy Package v2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-deploy-package-v2.yml'

permissions:
  contents: read

jobs:
  package-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build flattened initial-install SQL
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.').resolve()
          source_re = re.compile(r'^\s*SOURCE\s+(.+?)\s*;\s*$', re.IGNORECASE)
          stack = []

          def expand(path: Path) -> str:
              path = path.resolve()
              if root not in path.parents and path != root:
                  raise RuntimeError(f'Unsafe SOURCE path: {path}')
              if not path.is_file():
                  raise RuntimeError(f'Missing SQL source: {path.relative_to(root)}')
              if path in stack:
                  raise RuntimeError('Circular SQL SOURCE chain')
              stack.append(path)
              output = [f'\n-- BEGIN INCLUDED FILE: {path.relative_to(root)}\n']
              for line in path.read_text(encoding='utf-8').splitlines(keepends=True):
                  match = source_re.match(line)
                  output.append(expand((root / match.group(1).strip()).resolve()) if match else line)
              output.append(f'\n-- END INCLUDED FILE: {path.relative_to(root)}\n')
              stack.pop()
              return ''.join(output)

          header = '''-- VP3 Media Platform - Initial Installation SQL
-- Source commit: ${{ github.event.pull_request.base.sha }}
-- Generated from database/schema.sql with all SOURCE directives expanded.
-- Import this one file into an empty MySQL/MariaDB database.

'''
          destination = root / 'vp3-media-platform-initial-install.sql'
          destination.write_text(header + expand(root / 'database/schema.sql'), encoding='utf-8')
          body = destination.read_text(encoding='utf-8')
          if source_re.findall(body):
              raise RuntimeError('Unresolved SOURCE directives remain.')
          PY

      - name: Build and validate deploy ZIP
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/vp3-media-platform"
          mkdir -p "$stage"
          rsync -a ./ "$stage/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'vp3-media-platform-initial-install.sql'
          cp vp3-media-platform-initial-install.sql "$stage/database/vp3-media-platform-initial-install.sql"
          (cd "$RUNNER_TEMP" && zip -qr "$GITHUB_WORKSPACE/vp3-media-platform-deploy.zip" vp3-media-platform)
          python3 - <<'PY'
          from pathlib import Path
          import hashlib, re, zipfile
          sql = Path('vp3-media-platform-initial-install.sql')
          archive = Path('vp3-media-platform-deploy.zip')
          body = sql.read_text(encoding='utf-8')
          if sql.stat().st_size < 1000 or not re.search(r'^\s*CREATE\s+TABLE\b', body, re.I | re.M):
              raise RuntimeError('Invalid initial-install SQL.')
          if re.search(r'^\s*SOURCE\s+', body, re.I | re.M):
              raise RuntimeError('Unresolved SOURCE directive.')
          with zipfile.ZipFile(archive) as package:
              if package.testzip():
                  raise RuntimeError('Corrupt deployment ZIP.')
              required = {
                  'vp3-media-platform/bootstrap.php',
                  'vp3-media-platform/config-example.php',
                  'vp3-media-platform/install.php',
                  'vp3-media-platform/create-first-admin.php',
                  'vp3-media-platform/admin/login.php',
                  'vp3-media-platform/database/vp3-media-platform-initial-install.sql',
              }
              missing = sorted(required - set(package.namelist()))
              if missing:
                  raise RuntimeError(f'Missing required files: {missing}')
          Path('SHA256SUMS.txt').write_text(
              ''.join(f'{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n' for path in (archive, sql)),
              encoding='utf-8'
          )
          PY
          cat > BUILD_INFO.txt <<EOF
          VP3 Media Platform deployment package
          Repository: bigriversocial74/vp3-media-platform
          Main commit: ${{ github.event.pull_request.base.sha }}
          Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Initial database file: vp3-media-platform-initial-install.sql
          Browser owner setup: create-first-admin.php
          EOF

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: vp3-media-platform-initial-deploy-v2
          path: |
            vp3-media-platform-deploy.zip
            vp3-media-platform-initial-install.sql
            SHA256SUMS.txt
            BUILD_INFO.txt
          if-no-files-found: error
          retention-days: 7
