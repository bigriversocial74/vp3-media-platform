name: Build VP3 Deployment Artifacts

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-deploy-artifacts.yml'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build flattened initial-install SQL
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.').resolve()
          source_re = re.compile(r'^\s*SOURCE\s+(.+?)\s*;\s*$', re.IGNORECASE)
          visited_stack = []

          def expand(path: Path) -> str:
              path = path.resolve()
              if root not in path.parents and path != root:
                  raise RuntimeError(f'Unsafe SOURCE path: {path}')
              if not path.is_file():
                  raise RuntimeError(f'Missing SQL source: {path.relative_to(root)}')
              if path in visited_stack:
                  chain = ' -> '.join(str(p.relative_to(root)) for p in visited_stack + [path])
                  raise RuntimeError(f'Circular SQL SOURCE chain: {chain}')

              visited_stack.append(path)
              output = [f'\n-- BEGIN INCLUDED FILE: {path.relative_to(root)}\n']
              for line in path.read_text(encoding='utf-8').splitlines(keepends=True):
                  match = source_re.match(line)
                  if match:
                      output.append(expand((root / match.group(1).strip()).resolve()))
                  else:
                      output.append(line)
              output.append(f'\n-- END INCLUDED FILE: {path.relative_to(root)}\n')
              visited_stack.pop()
              return ''.join(output)

          header = '''-- VP3 Media Platform - Initial Installation SQL\n-- Source commit: ${{ github.event.pull_request.base.sha }}\n-- Generated from database/schema.sql with all SOURCE directives expanded.\n-- Import this one file into an empty MySQL/MariaDB database.\n\n'''
          destination = root / 'vp3-media-platform-initial-install.sql'
          destination.write_text(header + expand(root / 'database/schema.sql'), encoding='utf-8')
          print(f'Generated {destination} ({destination.stat().st_size} bytes)')
          PY

      - name: Build deploy ZIP
        shell: bash
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/vp3-media-platform"
          mkdir -p "$stage"
          rsync -a ./ "$stage/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'vp3-media-platform-initial-install.sql'
          cp vp3-media-platform-initial-install.sql "$stage/database/vp3-media-platform-initial-install.sql"
          (
            cd "$RUNNER_TEMP"
            zip -qr "$GITHUB_WORKSPACE/vp3-media-platform-deploy.zip" vp3-media-platform
          )

      - name: Validate package and create checksums
        shell: bash
        run: |
          cat > BUILD_INFO.txt <<EOF
          VP3 Media Platform deployment package
          Repository: bigriversocial74/vp3-media-platform
          Main commit: ${{ github.event.pull_request.base.sha }}
          Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Initial database file: vp3-media-platform-initial-install.sql
          EOF
          unzip -t vp3-media-platform-deploy.zip
          python3 - <<'PY'
          from pathlib import Path
          import re
          import zipfile

          sql = Path('vp3-media-platform-initial-install.sql')
          archive = Path('vp3-media-platform-deploy.zip')
          if not sql.is_file() or sql.stat().st_size < 1000:
              raise RuntimeError('Initial-install SQL is missing or unexpectedly small.')
          if not archive.is_file() or archive.stat().st_size < 1000:
              raise RuntimeError('Deployment ZIP is missing or unexpectedly small.')

          text = sql.read_text(encoding='utf-8')
          if 'CREATE TABLE' not in text.upper():
              raise RuntimeError('Initial-install SQL contains no CREATE TABLE statements.')
          unresolved = re.findall(r'^\s*SOURCE\s+.+?;\s*$', text, flags=re.IGNORECASE | re.MULTILINE)
          if unresolved:
              raise RuntimeError(f'Unresolved SOURCE directives remain: {unresolved[:5]}')

          with zipfile.ZipFile(archive) as package:
              bad = package.testzip()
              if bad:
                  raise RuntimeError(f'Corrupt ZIP member: {bad}')
              names = set(package.namelist())
              required = {
                  'vp3-media-platform/index.php',
                  'vp3-media-platform/bootstrap.php',
                  'vp3-media-platform/database/vp3-media-platform-initial-install.sql',
              }
              missing = required - names
              if missing:
                  raise RuntimeError(f'Deployment ZIP is missing required files: {sorted(missing)}')

          print(f'Validated SQL: {sql.stat().st_size} bytes')
          print(f'Validated ZIP: {archive.stat().st_size} bytes')
          PY
          sha256sum vp3-media-platform-deploy.zip vp3-media-platform-initial-install.sql > SHA256SUMS.txt

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: vp3-media-platform-initial-deploy
          path: |
            vp3-media-platform-deploy.zip
            vp3-media-platform-initial-install.sql
            SHA256SUMS.txt
            BUILD_INFO.txt
          if-no-files-found: error
          retention-days: 7
